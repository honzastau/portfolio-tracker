<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef} = React;

const API = "https://script.google.com/macros/s/AKfycbwgiEW2IW7ZKwc120CcevGfmJRKHJw2Zzm3_8koOXI4iT-hIMLOiAxxqXfc2zi1PR14/exec";
const REFRESH = 60000;
const CAT_COLORS = {Tech:"#6abf00",Dividendové:"#ff6b35",ETF:"#06b6d4",Krypto:"#a78bfa",Komodity:"#fbbf24",Jiné:"#94a3b8"};
const BROKERS = ["Trading 212","XTB","Revolut"];
const BROKER_COLORS = {"Trading 212":"#6abf00","XTB":"#ff6b35","Revolut":"#06b6d4"};

// ── Formatters ─────────────────────────────────────────────────────────────
const fmt    = n => new Intl.NumberFormat("cs-CZ",{style:"currency",currency:"CZK",maximumFractionDigits:0}).format(n??0);
const fmtN   = n => new Intl.NumberFormat("cs-CZ",{maximumFractionDigits:4}).format(n??0);
const fmtPct = n => n==null?"—":(n>=0?"+":"")+n.toFixed(2)+" %";
const fmtDate= s => s?new Date(s).toLocaleDateString("cs-CZ"):"";
const uid    = () => Math.random().toString(36).slice(2,9);

// ── API ────────────────────────────────────────────────────────────────────
const apiFetch = async p => (await fetch(API+"?"+new URLSearchParams(p))).json();
const apiPost  = async b => (await fetch(API,{method:"POST",body:JSON.stringify(b)})).json();

// ── Core engine: compute portfolio state from raw transactions ─────────────
// Returns: { open, closed, dividends, history }
function computePortfolio(transactions) {
  const parseDate = d => { try { return new Date(String(d).replace(" ","T")); } catch { return new Date(0); }};
  const txs = [...transactions].filter(t=>t&&t.ticker).sort((a,b)=>parseDate(a.datetime)-parseDate(b.datetime));

  const positions = {};
  const closed    = [];
  const dividends = txs.filter(t=>t.txType==="dividend");
  const history   = [];

  for (const tx of txs) {
    if (tx.txType === "dividend") continue;

    const ticker    = tx.ticker;
    const shares    = Number(tx.shares);   // záporné u prodeje
    const fillPrice = Number(tx.fillPrice);
    const isBuy     = shares > 0;

    // Použij objem v CZK (Total z CSV) jako nákladovou základnu
    // Pokud není k dispozici, použij fillPrice (může být v cizí měně)
    const volCZK    = tx.volume && Number(tx.volume) > 0 ? Number(tx.volume) : null;
    const costCZK   = volCZK !== null ? volCZK : Math.abs(shares) * fillPrice;

    if (!positions[ticker]) {
      positions[ticker] = {
        ticker, name:tx.name||ticker, category:tx.category||"Jiné",
        broker:tx.broker||"", shares:0, totalCost:0, avgPrice:0,
        avgPriceCZK:0, currency:tx.currency||"EUR", firstBuy:tx.datetime,
      };
    }
    const pos = positions[ticker];
    pos.currency = tx.currency || pos.currency;

    if (isBuy) {
      pos.totalCost  += costCZK;               // v CZK
      pos.shares     += shares;
      pos.avgPrice    = fillPrice;              // v původní měně (pro display)
      pos.avgPriceCZK = pos.totalCost / pos.shares; // v CZK (pro P&L výpočty)
    } else {
      const sellShares  = Math.abs(shares);
      const sellCZK     = volCZK !== null ? volCZK : sellShares * fillPrice;
      const costOfSold  = pos.avgPriceCZK * sellShares;
      const realizedPnl = sellCZK - costOfSold;

      pos.shares    -= sellShares;
      pos.totalCost  = pos.shares > 0.0001 ? pos.avgPriceCZK * pos.shares : 0;

      if (pos.shares <= 0.0001) {
        closed.push({
          ticker, name:pos.name, category:pos.category, broker:pos.broker,
          closedAt:tx.datetime, avgBuyPrice:pos.avgPriceCZK,
          sellPrice:sellCZK / sellShares, realizedPnl,
          realizedPct: costOfSold > 0 ? (realizedPnl / costOfSold) * 100 : 0,
        });
        delete positions[ticker];
      }
    }

    const totalCost = Object.values(positions).reduce((s,p)=>s+p.totalCost,0);
    history.push({ date:parseDate(tx.datetime).toISOString(), totalCost });
  }

  return {
    open: Object.values(positions).filter(p=>p.shares>0.0001),
    closed, dividends, history,
  };
}

// ── Sparkline ──────────────────────────────────────────────────────────────
const Sparkline = ({up}) => (

// ── Portfolio history chart ────────────────────────────────────────────────
function HistoryChart({history, prices, open, fx}) {
  const [period, setPeriod]   = useState("MAX");
  const [tooltip, setTooltip] = useState(null);
  const svgRef = useRef(null);

  const PERIODS = ["1M","3M","6M","1R","MAX"];

  // Build timeline points from history + current value
  const allPoints = useMemo(() => {
    if (!history.length) return [];
    const pts = history.map(h => { try { return { date: new Date(h.date), val: Number(h.totalCost)||0 }; } catch { return null; }}).filter(Boolean);
    const currentVal = open.reduce((s,p) => {
      const native = prices[p.ticker]?.current;
      if (native && native > 0) {
        const cur = (p.currency||"USD").toUpperCase();
        const rate = cur === "CZK" ? 1 : (fx[cur] || fx["USD"] || 25);
        return s + p.shares * native * rate;
      }
      return s + p.totalCost;
    }, 0);
    if (currentVal > 0) pts.push({ date: new Date(), val: currentVal });
    // Deduplicate by day — keep last value per day
    const byDay = {};
    pts.forEach(p => {
      const key = p.date.toISOString().slice(0,10);
      byDay[key] = p;
    });
    return Object.values(byDay).sort((a,b) => a.date - b.date);
  }, [history, open, prices]);

  const filteredPoints = useMemo(() => {
    if (!allPoints.length) return [];
    const now = new Date();
    const cutoff = {
      "1M": new Date(now - 30*86400000),
      "3M": new Date(now - 90*86400000),
      "6M": new Date(now - 180*86400000),
      "1R": new Date(now - 365*86400000),
      "MAX": new Date(0),
    }[period];
    const filtered = allPoints.filter(p => p.date >= cutoff);
    return filtered.length >= 2 ? filtered : allPoints;
  }, [allPoints, period]);

  if (!filteredPoints.length) return (
    <div style={{height:200,display:"flex",alignItems:"center",justifyContent:"center",color:"#8a9478",fontSize:12}}>
      Importujte CSV pro zobrazení vývoje
    </div>
  );

  const W=600, H=180, PAD={l:10,r:10,t:10,b:30};
  const IW=W-PAD.l-PAD.r, IH=H-PAD.t-PAD.b;

  const dates = filteredPoints.map(p => p.date.getTime());
  const vals  = filteredPoints.map(p => p.val);
  const minD=Math.min(...dates), maxD=Math.max(...dates);
  const minV=Math.min(...vals), maxV=Math.max(...vals);
  const padV=(maxV-minV)*0.08||maxV*0.05;

  const toX = d => PAD.l + ((d-minD)/(maxD-minD||1))*IW;
  const toY = v => PAD.t + IH - ((v-(minV-padV))/((maxV+padV)-(minV-padV)||1))*IH;

  const pathD = filteredPoints.map((p,i) => `${i===0?"M":"L"}${toX(p.date.getTime()).toFixed(1)},${toY(p.val).toFixed(1)}`).join(" ");
  const areaD = pathD + ` L${toX(dates[dates.length-1])},${PAD.t+IH} L${PAD.l},${PAD.t+IH}Z`;

  const lastVal  = vals[vals.length-1];
  const firstVal = vals[0];
  const up       = lastVal >= firstVal;
  const color    = up ? "#6abf00" : "#e03030";
  const pct      = firstVal > 0 ? ((lastVal-firstVal)/firstVal)*100 : 0;

  // Y axis labels
  const yLabels = [0, 0.25, 0.5, 0.75, 1].map(t => ({
    y: PAD.t + IH*(1-t),
    val: (minV-padV) + ((maxV+padV)-(minV-padV))*t,
  }));

  // X axis labels — pick ~4 evenly spaced dates
  const xLabels = (() => {
    const n = Math.min(4, filteredPoints.length);
    const indices = Array.from({length:n}, (_,i) => Math.round(i*(filteredPoints.length-1)/(n-1||1)));
    return [...new Set(indices)].map(i => filteredPoints[i]);
  })();

  const handleMouseMove = (e) => {
    const svg = svgRef.current;
    if (!svg) return;
    const rect = svg.getBoundingClientRect();
    const mx   = (e.clientX - rect.left) / rect.width * W;
    // Find closest point
    let best = 0, bestDist = Infinity;
    filteredPoints.forEach((p,i) => {
      const d = Math.abs(toX(p.date.getTime()) - mx);
      if (d < bestDist) { bestDist=d; best=i; }
    });
    const p = filteredPoints[best];
    setTooltip({ x: toX(p.date.getTime()), y: toY(p.val), val: p.val, date: p.date });
  };

  const fmtShort = n => new Intl.NumberFormat("cs-CZ",{style:"currency",currency:"CZK",notation:"compact",maximumFractionDigits:0}).format(n);

  return (
    <div>
      {/* Period selector + current value */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{display:"flex",gap:4}}>
          {PERIODS.map(p=>(
            <button key={p} onClick={()=>setPeriod(p)} style={{padding:"4px 12px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11,background:period===p?"#eef1e8":"transparent",color:period===p?"#1a1f12":"#8a9478",fontWeight:period===p?"500":"400"}}>
              {p}
            </button>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12,fontSize:12}}>
          <span style={{color:up?"#2ea84e":"#e03030",fontWeight:500}}>{up?"+":""}{pct.toFixed(2)} %</span>
          <span style={{color:"#8a9478"}}>{fmtShort(firstVal)} → <span style={{color:"#1a1f12",fontWeight:500}}>{fmtShort(lastVal)}</span></span>
        </div>
      </div>

      {/* Chart */}
      <div style={{position:"relative"}}>
        <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:200,cursor:"crosshair"}}
          onMouseMove={handleMouseMove} onMouseLeave={()=>setTooltip(null)}>
          <defs>
            <linearGradient id="hg2" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.18"/>
              <stop offset="100%" stopColor={color} stopOpacity="0"/>
            </linearGradient>
          </defs>

          {/* Y grid lines + labels */}
          {yLabels.map((l,i)=>(
            <g key={i}>
              <line x1={PAD.l} y1={l.y} x2={W-PAD.r} y2={l.y} stroke="#eef1e8" strokeWidth="1"/>
              <text x={PAD.l+4} y={l.y-4} fontSize="8" fill="#8a9478" fontFamily="'DM Mono',monospace">{fmtShort(l.val)}</text>
            </g>
          ))}

          {/* Area + line */}
          <path d={areaD} fill="url(#hg2)"/>
          <path d={pathD} stroke={color} strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>

          {/* X axis labels */}
          {xLabels.map((p,i)=>(
            <text key={i} x={toX(p.date.getTime())} y={H-6} textAnchor="middle" fontSize="8" fill="#8a9478" fontFamily="'DM Mono',monospace">
              {p.date.toLocaleDateString("cs-CZ",{day:"numeric",month:"short",year:period==="MAX"||period==="1R"?"2-digit":undefined})}
            </text>
          ))}

          {/* Tooltip vertical line + dot */}
          {tooltip && (
            <g>
              <line x1={tooltip.x} y1={PAD.t} x2={tooltip.x} y2={PAD.t+IH} stroke={color} strokeWidth="1" strokeDasharray="4 3" opacity="0.6"/>
              <circle cx={tooltip.x} cy={tooltip.y} r="5" fill={color} stroke="#fff" strokeWidth="2"/>
            </g>
          )}
        </svg>

        {/* Tooltip box */}
        {tooltip && (
          <div style={{
            position:"absolute",
            left: tooltip.x/W*100 > 70 ? "auto" : `${tooltip.x/W*100+2}%`,
            right: tooltip.x/W*100 > 70 ? `${(1-tooltip.x/W)*100+2}%` : "auto",
            top: 10, pointerEvents:"none",
            background:"#fff", border:"1px solid #dde3d4", borderRadius:10,
            padding:"10px 14px", boxShadow:"0 4px 20px rgba(15,23,42,.1)",
            fontFamily:"'DM Mono',monospace", minWidth:160,
          }}>
            <div style={{fontSize:10,color:"#8a9478",marginBottom:4}}>
              {tooltip.date.toLocaleDateString("cs-CZ",{day:"numeric",month:"long",year:"numeric"})}
            </div>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:16,fontWeight:700,color:"#1a1f12"}}>
              {new Intl.NumberFormat("cs-CZ",{style:"currency",currency:"CZK",maximumFractionDigits:0}).format(tooltip.val)}
            </div>
            <div style={{fontSize:10,marginTop:4,color:tooltip.val>=firstVal?"#2ea84e":"#e03030"}}>
              {tooltip.val>=firstVal?"+":""}{((tooltip.val-firstVal)/firstVal*100).toFixed(2)} % od začátku
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Donut ──────────────────────────────────────────────────────────────────
function Donut({open, prices}) {
  const byCat={};let tot=0;
  open.forEach(p=>{const v=p.shares*(prices[p.ticker]?.current??p.avgPrice);byCat[p.category]=(byCat[p.category]||0)+v;tot+=v;});
  const R=52,cx=70,cy=70,sw=18,circ=2*Math.PI*R;let off=0;
  const segs=Object.entries(byCat).map(([cat,val])=>{const pct=val/(tot||1);const s={cat,off,dash:pct*circ};off+=pct*circ;return s;});
  return (
    <svg width="140" height="140" viewBox="0 0 140 140">
      {segs.map(s=><circle key={s.cat} cx={cx} cy={cy} r={R} fill="none" stroke={CAT_COLORS[s.cat]||"#94a3b8"} strokeWidth={sw} strokeDasharray={`${s.dash} ${circ}`} strokeDashoffset={-s.off+circ*.25}/>)}
      <text x={cx} y={cy-6} textAnchor="middle" fontSize="13" fontFamily="'Syne',sans-serif" fontWeight="700" fill="#1a1f12">{segs.length}</text>
      <text x={cx} y={cy+9} textAnchor="middle" fontSize="8" fontFamily="'DM Mono',monospace" fill="#8a9478" letterSpacing="1">TŘÍDY</text>
    </svg>
  );
}

// ── CSV Parser (Trading 212 format) ───────────────────────────────────────
function parseCSV(text) {
  const lines   = text.trim().split("\n");
  const headers = lines[0].split(",").map(h=>h.replace(/"/g,"").trim());
  const parseRow = row => {
    const parts=[]; let inQ=false,cur="";
    for (const ch of row){if(ch==='"'){inQ=!inQ;}else if(ch===","&&!inQ){parts.push(cur.trim());cur="";}else cur+=ch;}
    parts.push(cur.trim()); return parts;
  };
  const col=(parts,name)=>{const i=headers.findIndex(h=>h===name);return i<0?"":(parts[i]||"").replace(/"/g,"").trim();};

  const txs=[];
  for (const line of lines.slice(1)){
    if (!line.trim()) continue;
    const parts  = parseRow(line);
    const action = col(parts,"Action").toLowerCase();
    const ticker = col(parts,"Ticker"); if(!ticker) continue;
    const name   = col(parts,"Name");
    const dt     = col(parts,"Time");
    const cur    = col(parts,"Currency (Price / share)")||col(parts,"Currency (Total)")||"EUR";

    if (action.includes("buy")||action.includes("sell")){
      const shares=parseFloat(col(parts,"No. of shares")); if(isNaN(shares)) continue;
      const fill=parseFloat(col(parts,"Price / share"));   if(isNaN(fill)) continue;
      // Exchange rate from CSV: T212 stores it as foreign/CZK (inverted)
      // So 1 CZK = rate foreign → 1 foreign = 1/rate CZK
      const rateInv = parseFloat(col(parts,"Exchange rate")) || 0;
      const rateCZK = rateInv > 0 ? 1/rateInv : 1; // CZK per 1 unit of foreign currency
      // Use Total column (already in CZK) as the authoritative volume
      const totalCZK = parseFloat(col(parts,"Total")) || Math.abs(shares)*fill*rateCZK;
      const isSell = action.includes("sell");
      txs.push({id:uid(),ticker:ticker.toUpperCase(),name,
        shares:isSell?-Math.abs(shares):shares,
        fillPrice:fill, volume:String(totalCZK),
        currency:cur, exchangeRate:rateCZK,
        datetime:dt, broker:"Trading 212",
        txType:isSell?"sell":"buy", category:"Jiné"});
    } else if (action.includes("dividend")){
      const amount=parseFloat(col(parts,"Total"))||0;
      txs.push({id:uid(),ticker:ticker.toUpperCase(),name,shares:0,fillPrice:0,volume:String(amount),amount,currency:col(parts,"Currency (Total)")||cur,datetime:dt,broker:"Trading 212",txType:"dividend",category:"Dividenda"});
    }
  }
  return txs;
}

// ── Modal: přidat transakci ────────────────────────────────────────────────
function Modal({onClose,onAdd,loading}){
  const now=new Date();
  const localISO=new Date(now.getTime()-now.getTimezoneOffset()*60000).toISOString().slice(0,16);
  const [form,setForm]=useState({ticker:"",name:"",category:"Jiné",shares:"",fillPrice:"",volume:"",currency:"CZK",datetime:localISO,broker:"Trading 212",txType:"buy",nameLoading:false,nameLoaded:false,customBroker:false});
  const IS={width:"100%",padding:"10px 14px",borderRadius:10,border:"1.5px solid #dde3d4",fontFamily:"'DM Mono',monospace",fontSize:13,color:"#1a1f12",outline:"none",boxSizing:"border-box",background:"#fff"};
  const LS={fontSize:10,letterSpacing:1,color:"#8a9478",display:"block",marginBottom:5,textTransform:"uppercase"};
  const set=k=>e=>{const v=e.target.value;setForm(f=>{const u={...f,[k]:v};if(k==="shares"||k==="fillPrice"){const s=k==="shares"?v:f.shares,p=k==="fillPrice"?v:f.fillPrice;if(s&&p)u.volume=(parseFloat(s)*parseFloat(p)).toFixed(2);}return u;});};
  const lookupName=async()=>{
    const t=form.ticker.trim().toUpperCase();if(!t||form.nameLoaded)return;
    setForm(f=>({...f,nameLoading:true}));
    try{
      const r=await fetch(API+"?"+new URLSearchParams({action:"getCompanyName",ticker:t}));
      const d=await r.json();
      setForm(f=>({...f,nameLoading:false,nameLoaded:true,
        name:d.name||f.name,
        currency:d.currency||f.currency,
        category:d.category||f.category,
      }));
    }
    catch{setForm(f=>({...f,nameLoading:false}));}
  };
  const CURS=["CZK","USD","EUR","GBP","Jiná…"];
  const activeCur=CURS.includes(form.currency)?form.currency:"Jiná…";
  const valid=form.ticker&&form.shares&&form.fillPrice&&form.datetime;

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.35)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
      <div style={{background:"#fff",borderRadius:20,padding:"32px 36px",width:500,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 32px 80px rgba(15,23,42,.14)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <span style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:700}}>Nová transakce</span>
          <button onClick={onClose} style={{background:"#f4f6f0",border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:18,color:"#8a9478"}}>×</button>
        </div>

        {/* Typ */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:20}}>
          {[["buy","Nákup","#6abf00"],["sell","Prodej","#e03030"]].map(([t,l,c])=>(
            <button key={t} onClick={()=>setForm(f=>({...f,txType:t}))} style={{padding:"10px",borderRadius:10,border:`2px solid ${form.txType===t?c:"#dde3d4"}`,background:form.txType===t?c+"10":"#fff",color:form.txType===t?c:"#8a9478",fontFamily:"'Syne',sans-serif",fontWeight:600,fontSize:13,cursor:"pointer"}}>{l}</button>
          ))}
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:12,marginBottom:14}}>
          <div>
            <label style={LS}>Ticker</label>
            <input value={form.ticker} onChange={e=>setForm(f=>({...f,ticker:e.target.value.toUpperCase(),nameLoaded:false}))} onBlur={lookupName} style={IS} onFocus={e=>e.target.style.borderColor="#6abf00"}/>
          </div>
          <div>
            <label style={LS}>Název {form.nameLoading&&<span style={{color:"#6abf00",fontSize:9}}>načítám…</span>}{form.nameLoaded&&<span style={{color:"#2ea84e",fontSize:9}}>✓</span>}</label>
            <input value={form.name} onChange={set("name")} style={IS} onFocus={e=>e.target.style.borderColor="#6abf00"} onBlur={e=>e.target.style.borderColor="#dde3d4"}/>
          </div>
        </div>

        <div style={{marginBottom:14}}>
          <label style={LS}>Datum a čas</label>
          <input type="datetime-local" value={form.datetime} onChange={set("datetime")} style={IS} onFocus={e=>e.target.style.borderColor="#6abf00"} onBlur={e=>e.target.style.borderColor="#dde3d4"}/>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
          <div><label style={LS}>Počet kusů</label><input type="number" value={form.shares} onChange={set("shares")} style={IS} onFocus={e=>e.target.style.borderColor="#6abf00"} onBlur={e=>e.target.style.borderColor="#dde3d4"}/></div>
          <div><label style={LS}>Realizační cena</label><input type="number" value={form.fillPrice} onChange={set("fillPrice")} style={IS} onFocus={e=>e.target.style.borderColor="#6abf00"} onBlur={e=>e.target.style.borderColor="#dde3d4"}/></div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
          <div><label style={LS}>Objem transakce</label><input type="number" value={form.volume} onChange={set("volume")} style={{...IS,background:form.shares&&form.fillPrice?"#f9fbf6":"#fff"}} onFocus={e=>e.target.style.borderColor="#6abf00"} onBlur={e=>e.target.style.borderColor="#dde3d4"}/></div>
          <div>
            <label style={LS}>Měna</label>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {CURS.map(c=><button key={c} onClick={()=>setForm(f=>({...f,currency:c==="Jiná…"?"":c}))} style={{padding:"5px 10px",borderRadius:8,border:`1.5px solid ${activeCur===c?"#6abf00":"#dde3d4"}`,background:activeCur===c?"#f0fdf4":"#fff",color:activeCur===c?"#3a6600":"#8a9478",fontSize:11,cursor:"pointer"}}>{c}</button>)}
            </div>
            {activeCur==="Jiná…"&&<input value={form.currency} onChange={set("currency")} style={{...IS,marginTop:6}} onFocus={e=>e.target.style.borderColor="#6abf00"} onBlur={e=>e.target.style.borderColor="#dde3d4"}/>}
          </div>
        </div>

        <div style={{marginBottom:14}}>
          <label style={LS}>Kategorie</label>
          <select value={form.category} onChange={set("category")} style={{...IS,cursor:"pointer"}}>
            {Object.keys(CAT_COLORS).map(c=><option key={c}>{c}</option>)}
          </select>
        </div>

        <div style={{marginBottom:20}}>
          <label style={LS}>Broker</label>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {[...BROKERS,"Jiný…"].map(b=><button key={b} onClick={()=>setForm(f=>({...f,broker:b==="Jiný…"?"":b,customBroker:b==="Jiný…"}))} style={{padding:"6px 12px",borderRadius:8,border:`1.5px solid ${(form.broker===b||(form.customBroker&&b==="Jiný…"))?"#6abf00":"#dde3d4"}`,background:(form.broker===b||(form.customBroker&&b==="Jiný…"))?"#f0fdf4":"#fff",color:(form.broker===b||(form.customBroker&&b==="Jiný…"))?"#3a6600":"#8a9478",fontSize:11,cursor:"pointer"}}>{b}</button>)}
          </div>
          {form.customBroker&&<input value={form.broker} onChange={e=>setForm(f=>({...f,broker:e.target.value}))} style={{...IS,marginTop:8}} onFocus={e=>e.target.style.borderColor="#6abf00"} onBlur={e=>e.target.style.borderColor="#dde3d4"}/>}
        </div>

        {/* Kurz ke dni transakce — jen pokud měna není CZK */}
        {form.currency && form.currency !== "CZK" && (
          <div style={{marginBottom:14}}>
            <label style={LS}>Kurz ke dni transakce ({form.currency}/CZK)</label>
            <input type="number" value={form.exchangeRate} onChange={set("exchangeRate")} style={IS}
              onFocus={e=>e.target.style.borderColor="#6abf00"}
              onBlur={e=>e.target.style.borderColor="#dde3d4"}/>
            <div style={{fontSize:10,color:"#8a9478",marginTop:4}}>
              Objem v CZK: {form.shares&&form.fillPrice&&form.exchangeRate ? fmt(parseFloat(form.shares)*parseFloat(form.fillPrice)*parseFloat(form.exchangeRate)) : "—"}
            </div>
          </div>
        )}

        {form.shares&&form.fillPrice&&<div style={{background:"#f4f6f0",borderRadius:10,padding:"12px 16px",marginBottom:20,fontSize:11,color:"#8a9478",display:"flex",justifyContent:"space-between"}}><span>{form.shares} ks × {form.fillPrice} {form.currency}</span><span style={{color:"#1a1f12",fontWeight:500}}>= {form.volume?parseFloat(form.volume).toLocaleString("cs-CZ"):"—"} {form.currency}</span></div>}

        <button onClick={()=>onAdd(form)} disabled={!valid||loading} style={{width:"100%",padding:13,background:valid&&!loading?"#6abf00":"#eef1e8",border:"none",borderRadius:12,fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:500,color:valid&&!loading?"#fff":"#8a9478",cursor:valid&&!loading?"pointer":"not-allowed"}}>
          {loading?"Ukládám…":form.txType==="buy"?"Přidat nákup →":"Přidat prodej →"}
        </button>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────
function App(){
  const [transactions,setTransactions] = useState([]);
  const [prices,setPrices]             = useState({});
  const [loading,setLoading]           = useState(true);
  const [loadingPrices,setLoadingPrices] = useState(false);
  const [saving,setSaving]             = useState(false);
  const [error,setError]               = useState(null);
  const [fx,setFx]                     = useState({USD:25,EUR:25}); // fallback rates CZK/unit
  const [showModal,setShowModal]       = useState(false);
  const [tab,setTab]                   = useState("přehled");
  const [lastUpdated,setLastUpdated]   = useState(null);
  const [csvState,setCsvState]         = useState(null); // null | "loading" | {imported,counts,failed}
  const timerRef = useRef(null);

  // ── Load all transactions ───────────────────────────────────────────────
  const loadTransactions = useCallback(async()=>{
    try{
      const d=await apiFetch({action:"getTransactions"});
      if(d.error) throw new Error(d.error);
      const all=[...(d.transactions||[]),...(d.dividends||[])];
      setTransactions(all);
      return all;
    }catch(e){setError("Chyba při načítání: "+e.message);return [];}
  },[]);

  // ── Load prices for open positions ──────────────────────────────────────
  const loadPrices = useCallback(async(txs)=>{
    const source=txs||transactions;
    const {open}=computePortfolio(source);
    if(!open.length)return;
    setLoadingPrices(true);
    try{
      const tickers=[...new Set(open.map(p=>p.ticker))].join(",");
      const [priceData, fxData] = await Promise.all([
        apiFetch({action:"getPrices",tickers}),
        apiFetch({action:"getFxRates"}),
      ]);
      if(priceData.prices){setPrices(priceData.prices);setLastUpdated(new Date());}
      if(fxData.rates){setFx(fxData.rates);}
    }catch(e){console.error(e);}
    finally{setLoadingPrices(false);}
  },[transactions]);

  useEffect(()=>{
    const init=async()=>{setLoading(true);const txs=await loadTransactions();await loadPrices(txs);setLoading(false);};
    init();
  },[]);

  useEffect(()=>{
    timerRef.current=setInterval(()=>loadPrices(),REFRESH);
    return()=>clearInterval(timerRef.current);
  },[transactions]);

  // ── Add single transaction ──────────────────────────────────────────────
  const handleAdd=useCallback(async(form)=>{
    setSaving(true);
    try{
      const sharesNum = form.txType==="sell" ? -Math.abs(parseFloat(form.shares)) : parseFloat(form.shares);
      const fillNum   = parseFloat(form.fillPrice);
      const rate      = parseFloat(form.exchangeRate) || 1;
      // Volume in CZK: if currency is CZK use fillPrice directly, otherwise multiply by exchange rate
      const volumeCZK = form.currency === "CZK"
        ? Math.abs(sharesNum) * fillNum
        : Math.abs(sharesNum) * fillNum * rate;
      const tx={id:uid(),ticker:form.ticker.toUpperCase().trim(),name:form.name||form.ticker,category:form.category,
        shares:sharesNum, fillPrice:fillNum, volume:String(volumeCZK.toFixed(2)),
        currency:form.currency, exchangeRate:rate,
        datetime:form.datetime,broker:form.broker,txType:form.txType};
      const res=await apiPost({action:"addTransaction",tx});
      if(res.error) throw new Error(res.error);
      const updated=[...transactions,tx];
      setTransactions(updated);
      await loadPrices(updated);
      setShowModal(false);
    }catch(e){setError("Chyba: "+e.message);}
    finally{setSaving(false);}
  },[transactions,loadPrices]);

  // ── Delete transaction ──────────────────────────────────────────────────
  const handleDelete=useCallback(async(id,isDividend)=>{
    try{
      await apiFetch({action:"deleteTransaction",id,sheet:isDividend?"Dividendy":"Transakce"});
      const updated=transactions.filter(t=>t.id!==id);
      setTransactions(updated);
      await loadPrices(updated);
    }catch(e){setError("Nepodařilo se smazat.");}
  },[transactions,loadPrices]);

  // ── CSV Import ──────────────────────────────────────────────────────────
  const handleCSV=useCallback(async(e)=>{
    const file=e.target.files[0];if(!file)return;
    setCsvState("loading");
    try{
      const text=await file.text();
      const txs=parseCSV(text);
      const counts={buy:0,sell:0,dividend:0};
      txs.forEach(t=>counts[t.txType]=(counts[t.txType]||0)+1);

      // Batch category lookup — fire and forget, don't block on errors
      const uniqueTickers=[...new Set(txs.filter(t=>t.txType!=="dividend").map(t=>t.ticker))];
      const categoryMap={};
      try {
        await Promise.allSettled(uniqueTickers.map(async ticker=>{
          try{
            const r=await fetch(API+"?"+new URLSearchParams({action:"getCompanyName",ticker}));
            const d=await r.json();
            if(d.category) categoryMap[ticker]=d.category;
            if(d.name)     categoryMap[ticker+"_name"]=d.name;
          }catch{}
        }));
      } catch {}
      txs.forEach(tx=>{
        if(categoryMap[tx.ticker])     tx.category=categoryMap[tx.ticker];
        if(categoryMap[tx.ticker+"_name"]&&tx.name===tx.ticker) tx.name=categoryMap[tx.ticker+"_name"];
      });

      // Save all to Apps Script in batch
      const nonDiv=txs.filter(t=>t.txType!=="dividend");
      const divs  =txs.filter(t=>t.txType==="dividend");
      let failed=0;
      if(nonDiv.length){const r=await apiPost({action:"addTransactions",txs:nonDiv});failed+=r.failed||0;}
      if(divs.length)  {const r=await apiPost({action:"addTransactions",txs:divs});  failed+=r.failed||0;}

      const updated=[...transactions,...txs];
      setTransactions(updated);
      await loadPrices(updated);
      setCsvState({imported:txs.length,counts,failed});
    }catch(err){setError("Chyba importu: "+err.message);setCsvState(null);}
    e.target.value="";
  },[transactions,loadPrices]);

  // ── Computed portfolio state ────────────────────────────────────────────
  const portfolio = useMemo(()=>computePortfolio(transactions),[transactions]);
  const {open,closed,dividends,history} = portfolio;

  // Převod ceny tickeru na CZK
  const toCZK = useCallback((price, currency) => {
    if (!price) return 0;
    const cur = (currency||"USD").toUpperCase();
    if (cur === "CZK") return price;
    return price * (fx[cur] || fx["USD"] || 25);
  }, [fx]);

  const stats = useMemo(()=>{
    const totalValue = open.reduce((s,p)=>{
      try {
        const priceNative = prices[p.ticker]?.current ?? 0;
        const valueCZK    = priceNative > 0 ? toCZK(priceNative, p.currency) * Number(p.shares) : Number(p.totalCost)||0;
        return s + (isNaN(valueCZK)?0:valueCZK);
      } catch { return s; }
    }, 0);
    const totalCost  = open.reduce((s,p)=>s+(isNaN(Number(p.totalCost))?0:Number(p.totalCost)), 0);
    const unrealPnl  = totalValue - totalCost;
    const unrealPct  = totalCost > 0 ? (unrealPnl/totalCost)*100 : 0;
    const realPnl    = closed.reduce((s,c)=>s+c.realizedPnl, 0);
    const totalDiv   = dividends.reduce((s,d)=>s+Number(d.amount||0), 0);
    const totalReturn= unrealPnl+realPnl+totalDiv;
    return {totalValue,totalCost,unrealPnl,unrealPct,realPnl,totalDiv,totalReturn};
  },[open,closed,dividends,prices,toCZK]);

  const getPriceCZK = (p) => {
    const native = prices[p.ticker]?.current;
    if (native && native > 0) return toCZK(native, p.currency);
    return p.avgPriceCZK || p.avgPrice;
  };
  const getValCZK = (p) => p.shares * getPriceCZK(p);
  const sortedOpen=[...open].sort((a,b)=>getValCZK(b)-getValCZK(a));

  if(loading) return(
    <div style={{minHeight:"100vh",background:"#f4f6f0",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}>
      <div style={{width:36,height:36,background:"#6abf00",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,color:"#fff"}}>P</div>
      <div style={{fontSize:12,color:"#8a9478",letterSpacing:1}}>NAČÍTÁM…</div>
    </div>
  );

  const s=stats;
  const NAV=[["přehled","⬛"],["pozice","☰"],["transakce","↕"],["uzavřené","✓"],["dividendy","$"],["brokeři","▣"]];

  return(
    <div className="layout">
      {/* Sidebar */}
      <aside className="sidebar">
        <div style={{width:36,height:36,background:"#6abf00",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,color:"#fff",marginBottom:16}}>P</div>
        {NAV.map(([t,icon])=><button key={t} className={`nav-item${tab===t?" active":""}`} onClick={()=>setTab(t)} title={t}>{icon}</button>)}
        <div style={{flex:1}}/>
        <button className="nav-item" title="Obnovit ceny" onClick={()=>loadPrices()}>{loadingPrices?"⟳":"↺"}</button>
      </aside>

      <main style={{padding:"32px 40px",maxWidth:1160}}>
        {/* Header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:32}}>
          <div>
            <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:700,letterSpacing:"-.5px",textTransform:"capitalize"}}>{tab}</h1>
            <span style={{fontSize:11,color:"#8a9478",letterSpacing:1}}>{lastUpdated?`AKTUALIZOVÁNO ${lastUpdated.toLocaleTimeString("cs-CZ",{hour:"2-digit",minute:"2-digit"})}${loadingPrices?" ⟳":""}` :"—"}</span>
          </div>
          <div style={{display:"flex",gap:10}}>
            <label className="btn btn-outline" style={{cursor:"pointer",display:"flex",alignItems:"center"}}>
              ↑ CSV
              <input type="file" accept=".csv" onChange={handleCSV} style={{display:"none"}}/>
            </label>
            <button className="btn btn-primary" onClick={()=>setShowModal(true)}>+ Přidat transakci</button>
          </div>
        </div>

        {/* Banners */}
        {error&&<div style={{background:"#fff0f0",border:"1px solid #fca5a5",borderRadius:10,padding:"12px 16px",marginBottom:20,fontSize:12,color:"#e03030",display:"flex",justifyContent:"space-between"}}>{error}<span style={{cursor:"pointer"}} onClick={()=>setError(null)}>×</span></div>}
        {csvState==="loading"&&<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"12px 16px",marginBottom:20,fontSize:12,color:"#3a6600"}}>⟳ Importuji CSV…</div>}
        {csvState&&csvState!=="loading"&&<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"12px 16px",marginBottom:20,fontSize:12,color:"#3a6600",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>✓ Import hotov — {csvState.imported} záznamů <span style={{color:"#8a9478"}}>({csvState.counts.buy||0} nákupů · {csvState.counts.sell||0} prodejů · {csvState.counts.dividend||0} dividend)</span>{csvState.failed>0&&<span style={{color:"#e03030",marginLeft:8}}>{csvState.failed} chyb</span>}</span><span style={{cursor:"pointer"}} onClick={()=>setCsvState(null)}>×</span></div>}

        {/* ── PŘEHLED ──────────────────────────────────────────────── */}
        {tab==="přehled"&&<>
          {/* Summary cards */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:24}}>
            {[
              {label:"Hodnota portfolia",val:fmt(s.totalValue),sub:fmtPct(s.unrealPct)+" nerealizovaně",up:s.unrealPct>=0},
              {label:"Nerealizovaný P&L",val:fmt(s.unrealPnl),sub:`z ${fmt(s.totalCost)} investováno`,up:s.unrealPnl>=0},
              {label:"Realizovaný P&L",val:fmt(s.realPnl),sub:`${closed.length} uzavřených pozic`,up:s.realPnl>=0},
              {label:"Celkový výnos",val:fmt(s.totalReturn),sub:`vč. ${fmt(s.totalDiv)} dividend`,up:s.totalReturn>=0},
            ].map((c,i)=><div key={i} className="card" style={{animationDelay:`${i*.07}s`}}>
              <div style={{fontSize:10,letterSpacing:1.5,color:"#8a9478",textTransform:"uppercase",marginBottom:10}}>{c.label}</div>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:700}}>{c.val}</div>
              <div style={{fontSize:11,marginTop:6}} className={c.up?"up":"down"}>{c.sub}</div>
            </div>)}
          </div>

          {/* Chart */}
          <div className="card" style={{padding:"28px",marginBottom:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:600}}>Vývoj portfolia</div>
                <div style={{fontSize:10,color:"#8a9478",letterSpacing:1,marginTop:2}}>NÁKLADY V ČASE + AKTUÁLNÍ HODNOTA</div>
              </div>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:700}} className={s.unrealPnl>=0?"up":"down"}>{fmt(s.totalValue)}</div>
            </div>
            <HistoryChart history={history} prices={prices} open={open} fx={fx}/>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:8,fontSize:10,color:"#8a9478"}}>
              <span>{history.length?fmtDate(history[0].date):""}</span>
              <span style={{color:"#6abf00"}}>Dnes</span>
            </div>
          </div>

          {/* Positions + allocation */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 320px",gap:20}}>
            <div className="card" style={{padding:"28px"}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:600,marginBottom:18}}>Otevřené pozice</div>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr><th style={{textAlign:"left"}}>Ticker</th><th style={{textAlign:"right"}}>Cena</th><th style={{textAlign:"right"}}>Průměr</th><th style={{textAlign:"right"}}>Hodnota</th><th style={{textAlign:"right"}}>P&L</th></tr></thead>
                <tbody>
                  {sortedOpen.slice(0,6).map(p=>{
                    const price=prices[p.ticker]?.current??p.avgPrice;
                    const val=p.shares*price, pnl=val-p.totalCost, pnlPct=p.totalCost>0?(pnl/p.totalCost)*100:0;
                    return(<tr key={p.ticker} className="thr">
                      <td><div style={{fontWeight:500}}>{p.ticker}</div><div style={{fontSize:10,color:"#8a9478"}}>{p.name}</div></td>
                      <td style={{textAlign:"right"}}>{fmt(priceCZK)}</td>
                      <td style={{textAlign:"right",color:"#8a9478"}}>{fmt(p.avgPriceCZK||p.avgPrice)}</td>
                      <td style={{textAlign:"right",fontWeight:500}}>{fmt(val)}</td>
                      <td style={{textAlign:"right"}}><div className={pnlPct>=0?"up":"down"}>{fmtPct(pnlPct)}</div><div style={{fontSize:10,color:pnl>=0?"#86efac":"#fca5a5"}}>{fmt(pnl)}</div></td>
                    </tr>);
                  })}
                </tbody>
              </table>
              {open.length===0&&<div style={{textAlign:"center",padding:"24px",color:"#8a9478",fontSize:12}}>Žádné otevřené pozice. Importujte CSV nebo přidejte transakci.</div>}
            </div>
            <div className="card" style={{padding:"28px"}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:600,marginBottom:20}}>Alokace</div>
              <div style={{display:"flex",alignItems:"center",gap:16}}>
                <Donut open={open} prices={prices}/>
                <div style={{flex:1}}>
                  {(()=>{
                    const tot=s.totalValue||1,map={};
                    open.forEach(p=>{const v=p.shares*(prices[p.ticker]?.current??p.avgPrice);map[p.category]=(map[p.category]||0)+v;});
                    return Object.entries(map).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>(
                      <div key={cat} style={{marginBottom:10}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,fontSize:11}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:7,height:7,borderRadius:"50%",background:CAT_COLORS[cat]||"#94a3b8"}}/><span style={{color:"#8a9478"}}>{cat}</span></div>
                          <span>{((val/tot)*100).toFixed(1)} %</span>
                        </div>
                        <div style={{background:"#eef1e8",borderRadius:3,height:4,overflow:"hidden"}}><div style={{width:`${(val/tot)*100}%`,height:"100%",background:CAT_COLORS[cat]||"#94a3b8",borderRadius:3}}/></div>
                      </div>
                    ));
                  })()}
                </div>
              </div>
            </div>
          </div>
        </>}

        {/* ── POZICE ───────────────────────────────────────────────── */}
        {tab==="pozice"&&<div className="card" style={{padding:"28px"}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:600,marginBottom:20}}>Otevřené pozice ({open.length})</div>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr><th style={{textAlign:"left"}}>Ticker</th><th style={{textAlign:"right"}}>Akt. cena</th><th style={{textAlign:"right"}}>Prům. nákup</th><th style={{textAlign:"right"}}>Kusů</th><th style={{textAlign:"right"}}>Hodnota</th><th style={{textAlign:"right"}}>P&L dnes</th><th style={{textAlign:"right"}}>P&L celkem</th><th style={{textAlign:"right"}}>Podíl</th></tr></thead>
            <tbody>
              {sortedOpen.map(p=>{
                const price=prices[p.ticker]?.current??p.avgPrice;
                const chPct=prices[p.ticker]?.changePct??null,chAbs=prices[p.ticker]?.change??null;
                const val=p.shares*price,pnl=val-p.totalCost,pnlPct=p.totalCost>0?(pnl/p.totalCost)*100:0;
                const dayPnl=chAbs!=null?chAbs*p.shares:null;
                const share=s.totalValue>0?(val/s.totalValue)*100:0;
                return(<tr key={p.ticker} className="thr">
                  <td><div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:32,height:32,borderRadius:8,background:`${CAT_COLORS[p.category]||"#94a3b8"}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:500,color:CAT_COLORS[p.category]||"#94a3b8"}}>{p.ticker.slice(0,3)}</div>
                    <div><div style={{fontWeight:500}}>{p.ticker}</div><div style={{fontSize:10,color:"#8a9478"}}>{p.name}</div></div>
                  </div></td>
                  <td style={{textAlign:"right"}}>{fmt(priceCZK)}</td>
                  <td style={{textAlign:"right",color:"#8a9478"}}>{fmt(p.avgPriceCZK||p.avgPrice)}</td>
                  <td style={{textAlign:"right"}}>{fmtN(p.shares)}</td>
                  <td style={{textAlign:"right",fontWeight:500}}>{fmt(val)}</td>
                  <td style={{textAlign:"right"}}><div className={chPct==null?"":chPct>=0?"up":"down"}>{fmtPct(chPct)}</div>{dayPnl!=null&&<div style={{fontSize:10,color:dayPnl>=0?"#86efac":"#fca5a5"}}>{fmt(dayPnl)}</div>}</td>
                  <td style={{textAlign:"right"}}><div className={pnlPct>=0?"up":"down"}>{fmtPct(pnlPct)}</div><div style={{fontSize:10,color:pnl>=0?"#86efac":"#fca5a5"}}>{fmt(pnl)}</div></td>
                  <td style={{textAlign:"right"}}>
                    <div style={{background:"#eef1e8",borderRadius:3,height:4,width:60,overflow:"hidden",marginLeft:"auto"}}><div style={{width:`${share}%`,height:"100%",background:"#6abf00",borderRadius:3}}/></div>
                    <div style={{fontSize:9,color:"#8a9478",marginTop:2}}>{share.toFixed(1)} %</div>
                  </td>
                </tr>);
              })}
            </tbody>
          </table>
          {open.length===0&&<div style={{textAlign:"center",padding:"40px",color:"#8a9478",fontSize:13}}>Žádné otevřené pozice.</div>}
        </div>}

        {/* ── TRANSAKCE ────────────────────────────────────────────── */}
        {tab==="transakce"&&<div className="card" style={{padding:"28px"}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:600,marginBottom:20}}>Historie transakcí ({transactions.filter(t=>t.txType!=="dividend").length})</div>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr><th style={{textAlign:"left"}}>Datum</th><th style={{textAlign:"left"}}>Ticker</th><th style={{textAlign:"right"}}>Typ</th><th style={{textAlign:"right"}}>Kusů</th><th style={{textAlign:"right"}}>Realizační cena</th><th style={{textAlign:"right"}}>Objem</th><th style={{textAlign:"right"}}>Broker</th><th></th></tr></thead>
            <tbody>
              {[...transactions].filter(t=>t.txType!=="dividend").sort((a,b)=>new Date(b.datetime)-new Date(a.datetime)).map(tx=>(
                <tr key={tx.id} className="thr">
                  <td style={{color:"#8a9478",fontSize:11,whiteSpace:"nowrap"}}>{fmtDate(tx.datetime)}</td>
                  <td><div style={{fontWeight:500}}>{tx.ticker}</div><div style={{fontSize:10,color:"#8a9478"}}>{tx.name}</div></td>
                  <td style={{textAlign:"right"}}><span className={`tag tag-${tx.txType}`}>{tx.txType==="buy"?"nákup":"prodej"}</span></td>
                  <td style={{textAlign:"right"}} className={Number(tx.shares)<0?"down":""}>{fmtN(Math.abs(Number(tx.shares)))}</td>
                  <td style={{textAlign:"right"}}>{fmt(tx.fillPrice)}</td>
                  <td style={{textAlign:"right"}}>{tx.volume?fmt(tx.volume):""}</td>
                  <td style={{textAlign:"right",fontSize:11,color:"#8a9478"}}>{tx.broker}</td>
                  <td style={{textAlign:"right"}}><button className="del-btn" onClick={()=>handleDelete(tx.id,false)} style={{background:"#fff0f0",border:"none",borderRadius:6,width:26,height:26,cursor:"pointer",fontSize:12,color:"#e03030"}}>×</button></td>
                </tr>
              ))}
            </tbody>
          </table>
          {transactions.filter(t=>t.txType!=="dividend").length===0&&<div style={{textAlign:"center",padding:"40px",color:"#8a9478",fontSize:13}}>Žádné transakce. Importujte CSV.</div>}
        </div>}

        {/* ── UZAVŘENÉ ─────────────────────────────────────────────── */}
        {tab==="uzavřené"&&<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16,marginBottom:24}}>
            {[
              {label:"Realizovaný P&L",val:fmt(s.realPnl),sub:`${closed.length} uzavřených pozic`,up:s.realPnl>=0},
              {label:"Průměr na pozici",val:fmt(closed.length?s.realPnl/closed.length:0),sub:"průměrný výsledek",up:s.realPnl>=0},
              {label:"Úspěšnost",val:`${closed.length?Math.round((closed.filter(c=>c.realizedPnl>=0).length/closed.length)*100):0} %`,sub:`${closed.filter(c=>c.realizedPnl>=0).length} ziskových z ${closed.length}`,up:true},
            ].map((c,i)=><div key={i} className="card" style={{animationDelay:`${i*.07}s`}}>
              <div style={{fontSize:10,letterSpacing:1.5,color:"#8a9478",textTransform:"uppercase",marginBottom:10}}>{c.label}</div>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:700}}>{c.val}</div>
              <div style={{fontSize:11,marginTop:6}} className={c.up?"up":"down"}>{c.sub}</div>
            </div>)}
          </div>
          <div className="card" style={{padding:"28px"}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:600,marginBottom:20}}>Uzavřené pozice</div>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr><th style={{textAlign:"left"}}>Ticker</th><th style={{textAlign:"right"}}>Uzavřeno</th><th style={{textAlign:"right"}}>Prům. nákup</th><th style={{textAlign:"right"}}>Cena prodeje</th><th style={{textAlign:"right"}}>Realizovaný P&L</th><th style={{textAlign:"right"}}>Broker</th></tr></thead>
              <tbody>
                {[...closed].sort((a,b)=>new Date(b.closedAt)-new Date(a.closedAt)).map((c,i)=>(
                  <tr key={i} className="thr">
                    <td><div style={{fontWeight:500}}>{c.ticker}</div><div style={{fontSize:10,color:"#8a9478"}}>{c.name}</div></td>
                    <td style={{textAlign:"right",color:"#8a9478",fontSize:11}}>{fmtDate(c.closedAt)}</td>
                    <td style={{textAlign:"right",color:"#8a9478"}}>{fmt(c.avgBuyPrice)}</td>
                    <td style={{textAlign:"right"}}>{fmt(c.sellPrice)}</td>
                    <td style={{textAlign:"right"}}><div className={c.realizedPnl>=0?"up":"down"}>{fmtPct(c.realizedPct)}</div><div style={{fontSize:10,color:c.realizedPnl>=0?"#86efac":"#fca5a5"}}>{fmt(c.realizedPnl)}</div></td>
                    <td style={{textAlign:"right",fontSize:11,color:"#8a9478"}}>{c.broker}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            {closed.length===0&&<div style={{textAlign:"center",padding:"40px",color:"#8a9478",fontSize:13}}>Žádné uzavřené pozice.</div>}
          </div>
        </>}

        {/* ── DIVIDENDY ────────────────────────────────────────────── */}
        {tab==="dividendy"&&<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16,marginBottom:24}}>
            {(()=>{
              const tot=dividends.reduce((s,d)=>s+Number(d.amount||0),0);
              return [
                {label:"Celkem přijato",val:fmt(tot),sub:`${dividends.length} výplat`,up:true},
                {label:"Různých titulů",val:[...new Set(dividends.map(d=>d.ticker))].length,sub:"platí dividendu",up:true},
                {label:"Průměr na výplatu",val:fmt(dividends.length?tot/dividends.length:0),sub:"na transakci",up:true},
              ].map((c,i)=><div key={i} className="card" style={{animationDelay:`${i*.07}s`}}>
                <div style={{fontSize:10,letterSpacing:1.5,color:"#8a9478",textTransform:"uppercase",marginBottom:10}}>{c.label}</div>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:700}}>{c.val}</div>
                <div style={{fontSize:11,marginTop:6,color:"#2ea84e"}}>{c.sub}</div>
              </div>);
            })()}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <div className="card" style={{padding:"28px"}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:600,marginBottom:20}}>Podle tickeru</div>
              {(()=>{
                const tot=dividends.reduce((s,d)=>s+Number(d.amount||0),0)||1;
                const map={};dividends.forEach(d=>{map[d.ticker]=(map[d.ticker]||0)+Number(d.amount||0);});
                return Object.entries(map).sort((a,b)=>b[1]-a[1]).map(([ticker,amt])=>(
                  <div key={ticker} style={{marginBottom:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:12}}><span style={{fontWeight:500}}>{ticker}</span><span>{fmt(amt)} <span style={{color:"#8a9478"}}>({((amt/tot)*100).toFixed(1)} %)</span></span></div>
                    <div style={{background:"#eef1e8",borderRadius:4,height:5,overflow:"hidden"}}><div style={{width:`${(amt/tot)*100}%`,height:"100%",background:"#f0a500",borderRadius:4}}/></div>
                  </div>
                ));
              })()}
              {dividends.length===0&&<div style={{color:"#8a9478",fontSize:12}}>Žádné dividendy.</div>}
            </div>
            <div className="card" style={{padding:"28px"}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:600,marginBottom:20}}>Historie výplat</div>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr><th style={{textAlign:"left"}}>Datum</th><th style={{textAlign:"left"}}>Ticker</th><th style={{textAlign:"right"}}>Výše</th><th style={{textAlign:"right"}}>Měna</th><th></th></tr></thead>
                <tbody>
                  {[...dividends].sort((a,b)=>new Date(b.datetime)-new Date(a.datetime)).map(d=>(
                    <tr key={d.id} className="thr">
                      <td style={{color:"#8a9478",fontSize:11}}>{fmtDate(d.datetime)}</td>
                      <td style={{fontWeight:500}}>{d.ticker}</td>
                      <td style={{textAlign:"right",color:"#2ea84e"}}>+{fmt(d.amount)}</td>
                      <td style={{textAlign:"right",color:"#8a9478",fontSize:11}}>{d.currency}</td>
                      <td style={{textAlign:"right"}}><button className="del-btn" onClick={()=>handleDelete(d.id,true)} style={{background:"#fff0f0",border:"none",borderRadius:6,width:26,height:26,cursor:"pointer",fontSize:12,color:"#e03030"}}>×</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </>}

        {/* ── BROKEŘI ──────────────────────────────────────────────── */}
        {tab==="brokeři"&&(()=>{
          const map={};
          open.forEach(p=>{const b=p.broker||"Nezadán",price=prices[p.ticker]?.current??p.avgPrice,val=p.shares*price;if(!map[b])map[b]={val:0,cost:0,positions:[]};map[b].val+=val;map[b].cost+=p.totalCost;map[b].positions.push(p);});
          const bs=Object.entries(map).map(([name,d])=>({name,...d,pnl:d.val-d.cost,pnlPct:d.cost>0?((d.val-d.cost)/d.cost)*100:0,share:s.totalValue>0?(d.val/s.totalValue)*100:0})).sort((a,b)=>b.val-a.val);
          const gc=n=>BROKER_COLORS[n]||"#94a3b8";
          return(
            <div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:16,marginBottom:24}}>
                {bs.map((b,i)=><div key={b.name} className="card" style={{animationDelay:`${i*.07}s`,borderTop:`3px solid ${gc(b.name)}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                    <div style={{width:36,height:36,borderRadius:10,background:`${gc(b.name)}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:gc(b.name),fontFamily:"'Syne',sans-serif"}}>{b.name.slice(0,2).toUpperCase()}</div>
                    <div><div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:700}}>{b.name}</div><div style={{fontSize:10,color:"#8a9478"}}>{b.positions.length} pozic · {b.share.toFixed(1)} % portfolia</div></div>
                  </div>
                  <div style={{marginBottom:8}}><div style={{fontSize:10,color:"#8a9478",letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>Celková hodnota</div><div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:700}}>{fmt(b.val)}</div></div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
                    <div><div style={{color:"#8a9478",marginBottom:2}}>Investováno</div><div>{fmt(b.cost)}</div></div>
                    <div style={{textAlign:"right"}}><div style={{color:"#8a9478",marginBottom:2}}>Zisk / Ztráta</div><div className={b.pnlPct>=0?"up":"down"}>{fmtPct(b.pnlPct)}</div></div>
                  </div>
                  <div style={{marginTop:12,background:"#eef1e8",borderRadius:4,height:4,overflow:"hidden"}}><div style={{width:`${b.share}%`,height:"100%",background:gc(b.name),borderRadius:4}}/></div>
                </div>)}
              </div>
              {bs.length===0&&<div className="card" style={{padding:"40px",textAlign:"center",color:"#8a9478",fontSize:13}}>Importujte transakce pro zobrazení statistik brokerů.</div>}
            </div>
          );
        })()}
      </main>

      {showModal&&<Modal onClose={()=>setShowModal(false)} onAdd={handleAdd} loading={saving}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
